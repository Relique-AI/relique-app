<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Télécharger Pépite</title>
  <script>
    var APP_STORE_URL = 'https://apps.apple.com/us/app/p%C3%A9pite-vente-estimation/id6764468976';
    var PLAY_STORE_URL = 'https://play.google.com/store/apps/details?id=com.hugosld.pepite';

    var ua = navigator.userAgent;
    if (/iPhone|iPad|iPod/.test(ua)) {
      window.location.href = APP_STORE_URL;
    } else if (/Android/.test(ua)) {
      window.location.href = PLAY_STORE_URL;
    } else {
      window.location.href = 'https://pepite-app.com/telecharger';
    }
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #FFFDF7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
    }
    .emoji { font-size: 52px; margin-bottom: 20px; }
    h1 { font-size: 22px; font-weight: 700; color: #1A1A1A; margin-bottom: 10px; }
    p { font-size: 15px; color: #777; line-height: 1.5; }
    .badge {
      display: inline-block;
      margin-top: 24px;
      padding: 10px 20px;
      border-radius: 10px;
      background: #F5F5F5;
      color: #999;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div>
    <div class="emoji">✨</div>
    <h1>Télécharger Pépite</h1>
    <p>Disponible sur App Store et Google Play.</p>
    <div style="margin-top:24px; display:flex; flex-direction:column; gap:12px; align-items:center;">
      <a href="https://apps.apple.com/us/app/p%C3%A9pite-vente-estimation/id6764468976" style="display:inline-block; padding:10px 20px; border-radius:10px; background:#1A1A1A; color:#fff; font-size:14px; text-decoration:none;">📱 App Store (iOS)</a>
      <a href="https://play.google.com/store/apps/details?id=com.hugosld.pepite" style="display:inline-block; padding:10px 20px; border-radius:10px; background:#F5F5F5; color:#1A1A1A; font-size:14px; text-decoration:none;">🤖 Google Play (Android)</a>
    </div>
  </div>
</body>
</html>

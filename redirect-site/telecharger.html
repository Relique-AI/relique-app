<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Télécharger Pépite</title>
  <script>
    // TODO: remplacer par les vraies URLs quand l'app est publiée
    var APP_STORE_URL = 'https://apps.apple.com/app/id'; // à compléter
    var PLAY_STORE_URL = 'https://play.google.com/store/apps/details?id=com.hugosld.pepite';

    var ua = navigator.userAgent;
    if (/iPhone|iPad|iPod/.test(ua) && APP_STORE_URL.indexOf('id/') === -1) {
      window.location.href = APP_STORE_URL;
    } else if (/Android/.test(ua)) {
      window.location.href = PLAY_STORE_URL;
    }
    // Desktop ou store pas encore publié : affiche la page ci-dessous
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #FFFDF7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
    }
    .emoji { font-size: 52px; margin-bottom: 20px; }
    h1 { font-size: 22px; font-weight: 700; color: #1A1A1A; margin-bottom: 10px; }
    p { font-size: 15px; color: #777; line-height: 1.5; }
    .badge {
      display: inline-block;
      margin-top: 24px;
      padding: 10px 20px;
      border-radius: 10px;
      background: #F5F5F5;
      color: #999;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div>
    <div class="emoji">✨</div>
    <h1>Pépite arrive bientôt</h1>
    <p>L'application sera disponible prochainement<br>sur App Store et Google Play.</p>
    <span class="badge">Bientôt disponible</span>
  </div>
</body>
</html>
